<!DOCTYPE html>
<html>
<head>
  <title>Stream Test</title>
</head>
<body>

<video id="localVideo" autoplay muted style="width:400px;"></video>

<script src="https://cdn.socket.io/4.5.3/socket.io.min.js"></script>

<script>
const socket = io('http://localhost:4000');

navigator.mediaDevices.getUserMedia({ video: true, audio: true })
  .then((stream) => {

    const video = document.getElementById('localVideo');
    video.srcObject = stream;

    // Check codec support (IMPORTANT)
    const mimeType = 'video/webm; codecs=vp8,opus';

    if (!MediaRecorder.isTypeSupported(mimeType)) {
      console.warn('⚠️ Codec not supported, falling back to default webm');
    }

    const mediaRecorder = new MediaRecorder(stream, {
      mimeType: MediaRecorder.isTypeSupported(mimeType) ? mimeType : 'video/webm'
    });

    mediaRecorder.ondataavailable = async (event) => {

      if (event.data && event.data.size > 0) {

        try {
          const buffer = await event.data.arrayBuffer();

          console.log('📦 Chunk size:', buffer.byteLength);

          socket.emit('stream-data', buffer);

        } catch (err) {
          console.error('❌ Chunk conversion error:', err);
        }
      }
    };

    mediaRecorder.onerror = (err) => {
      console.error('❌ MediaRecorder error:', err);
    };

    socket.on('connect', () => {
      console.log('🟢 Connected to server');
      socket.emit('start-stream');
    });

    mediaRecorder.start(1000); // 1 second chunks

    window.onbeforeunload = () => {
      mediaRecorder.stop();
      socket.emit('stop-stream');
    };

  })
  .catch((err) => {
    console.error('❌ getUserMedia error:', err);
  });

</script>

</body>
</html>
